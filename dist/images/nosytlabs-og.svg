<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="ogGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C1D95;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
    
    <!-- Overlay gradient -->
    <radialGradient id="ogOverlay" cx="30%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
    </radialGradient>
    
    <!-- Tech pattern -->
    <pattern id="ogPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="2" fill="rgba(255,255,255,0.1)"/>
      <circle cx="0" cy="0" r="1" fill="rgba(255,255,255,0.05)"/>
      <circle cx="60" cy="60" r="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="ogGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogGradient)"/>
  <rect width="1200" height="630" fill="url(#ogPattern)"/>
  <rect width="1200" height="630" fill="url(#ogOverlay)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="120" r="40" fill="rgba(255,255,255,0.1)" opacity="0.8"/>
  <rect x="950" y="80" width="80" height="80" rx="12" fill="rgba(255,255,255,0.08)" opacity="0.6"/>
  <polygon points="100,500 140,460 180,500 140,540" fill="rgba(255,255,255,0.1)" opacity="0.7"/>
  
  <!-- Main content area -->
  <g transform="translate(600, 315)">
    <!-- Logo area -->
    <circle cx="0" cy="-80" r="100" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="3" filter="url(#ogGlow)"/>
    
    <!-- Main brand text -->
    <text x="0" y="-60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="64" font-weight="bold" filter="url(#ogGlow)">
      NosytLabs
    </text>
    
    <!-- Tagline -->
    <text x="0" y="20" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-family="Arial, sans-serif" font-size="28" font-weight="500">
      Notable Opportunities Shape Your Tomorrow
    </text>
    
    <!-- Services -->
    <text x="0" y="60" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif" font-size="20" font-weight="400">
      Web Development • AI Integration • Content Creation • 3D Printing
    </text>
    
    <!-- Website URL -->
    <text x="0" y="100" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="18" font-weight="400">
      nosytlabs.com
    </text>
  </g>
  
  <!-- Tech icons in corners -->
  <g transform="translate(100, 100)" opacity="0.3">
    <rect x="0" y="0" width="30" height="30" rx="4" fill="rgba(255,255,255,0.4)"/>
    <rect x="35" y="0" width="30" height="30" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="70" y="0" width="30" height="30" rx="4" fill="rgba(255,255,255,0.2)"/>
  </g>
  
  <g transform="translate(1000, 450)" opacity="0.3">
    <circle cx="15" cy="15" r="15" fill="rgba(255,255,255,0.3)"/>
    <circle cx="45" cy="15" r="15" fill="rgba(255,255,255,0.2)"/>
    <circle cx="75" cy="15" r="15" fill="rgba(255,255,255,0.1)"/>
  </g>
  
  <!-- Subtle branding elements -->
  <path d="M0,0 L80,0 L80,8 L8,8 L8,80 L0,80 Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M1200,630 L1120,630 L1120,622 L1192,622 L1192,550 L1200,550 Z" fill="rgba(255,255,255,0.1)"/>
</svg>
