<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- Enhanced gradients with modern colors -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.08" />
      <stop offset="50%" style="stop-color:#EC4899;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:0.08" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="50%" style="stop-color:#EC4899" />
      <stop offset="100%" style="stop-color:#F97316" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#F97316" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Modern glassmorphism background -->
  <rect width="240" height="80" rx="16" fill="url(#bgGradient)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Enhanced icon with modern design -->
  <g transform="translate(16, 16)" filter="url(#glow)">
    <!-- Outer ring with gradient -->
    <circle cx="24" cy="24" r="20" stroke="url(#iconGradient)" stroke-width="3" fill="none" opacity="0.8"/>
    <!-- Inner gradient circle -->
    <circle cx="24" cy="24" r="12" fill="url(#iconGradient)" opacity="0.2" />
    <!-- Core element -->
    <circle cx="24" cy="24" r="6" fill="url(#iconGradient)" />
    <!-- Modern accent elements -->
    <circle cx="24" cy="6" r="3" fill="#7C3AED" opacity="0.9" />
    <circle cx="42" cy="24" r="3" fill="#F97316" opacity="0.9" />
    <circle cx="24" cy="42" r="3" fill="#7C3AED" opacity="0.9" />
    <circle cx="6" cy="24" r="3" fill="#F97316" opacity="0.9" />
    <!-- Additional modern elements -->
    <circle cx="33" cy="15" r="2" fill="#EC4899" opacity="0.7" />
    <circle cx="15" cy="33" r="2" fill="#EC4899" opacity="0.7" />
    <!-- Connecting lines for modern tech feel -->
    <line x1="24" y1="18" x2="24" y2="30" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="18" y1="24" x2="30" y2="24" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Enhanced typography -->
  <g filter="url(#textGlow)">
    <text x="72" y="35" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="800" fill="url(#textGradient)" letter-spacing="-0.02em">NosytLabs</text>
    <text x="72" y="55" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748B" letter-spacing="0.02em">NOTABLE OPPORTUNITIES SHAPE YOUR TOMORROW</text>
  </g>
</svg>
