<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Repair Icon in Fallout Style -->
  
  <!-- Background -->
  <circle cx="100" cy="100" r="80" fill="#1a1a1a" />
  <circle cx="100" cy="100" r="75" fill="#2a2a2a" />
  
  <!-- Repair Symbol - Wrench and Gear -->
  <g transform="translate(100, 100) scale(0.6)">
    <!-- Gear -->
    <circle cx="0" cy="0" r="60" fill="#888888" stroke="#666666" stroke-width="3" />
    <circle cx="0" cy="0" r="40" fill="#777777" stroke="#666666" stroke-width="2" />
    <circle cx="0" cy="0" r="15" fill="#555555" />
    
    <!-- Gear Teeth -->
    <rect x="-10" y="-80" width="20" height="20" fill="#888888" stroke="#666666" stroke-width="1" />
    <rect x="-10" y="60" width="20" height="20" fill="#888888" stroke="#666666" stroke-width="1" />
    <rect x="60" y="-10" width="20" height="20" fill="#888888" stroke="#666666" stroke-width="1" />
    <rect x="-80" y="-10" width="20" height="20" fill="#888888" stroke="#666666" stroke-width="1" />
    
    <rect x="-10" y="-80" width="20" height="20" fill="#888888" stroke="#666666" stroke-width="1" transform="rotate(45)" />
    <rect x="-10" y="60" width="20" height="20" fill="#888888" stroke="#666666" stroke-width="1" transform="rotate(45)" />
    <rect x="60" y="-10" width="20" height="20" fill="#888888" stroke="#666666" stroke-width="1" transform="rotate(45)" />
    <rect x="-80" y="-10" width="20" height="20" fill="#888888" stroke="#666666" stroke-width="1" transform="rotate(45)" />
  </g>
  
  <!-- Wrench -->
  <path d="M60 60 L90 90 L85 95 L120 130 L130 120 L95 85 L100 80 L70 50 C60 40, 40 60, 60 60 Z" 
        fill="#cc3333" stroke="#aa2222" stroke-width="3" />
  
  <!-- Radiation Glow Effect -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#cc3333" stroke-width="2" opacity="0.3" />
  <circle cx="100" cy="100" r="60" fill="none" stroke="#cc3333" stroke-width="2" opacity="0.2" />
  
  <!-- Weathered Edge Effect -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#111" stroke-width="3" stroke-dasharray="5,5" opacity="0.5" />
  
  <!-- Fallout-style Text -->
  <text x="100" y="190" font-family="monospace" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="#cc3333">REPAIR</text>
</svg>
