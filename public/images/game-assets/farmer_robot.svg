<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Farmer Robot in Fallout Style -->
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="#1a3d14" opacity="0.2" />
  
  <!-- Robot Body -->
  <rect x="70" y="80" width="60" height="70" rx="5" ry="5" fill="#5a7247" stroke="#2c3e1d" stroke-width="3" />
  
  <!-- Robot Head -->
  <rect x="75" y="50" width="50" height="40" rx="5" ry="5" fill="#5a7247" stroke="#2c3e1d" stroke-width="3" />
  
  <!-- Farmer Hat -->
  <path d="M70 50 L130 50 L120 40 L80 40 Z" fill="#8b4513" stroke="#2c3e1d" stroke-width="2" />
  <ellipse cx="100" cy="40" rx="25" ry="5" fill="#8b4513" stroke="#2c3e1d" stroke-width="2" />
  
  <!-- Eyes -->
  <circle cx="85" cy="70" r="7" fill="#000" />
  <circle cx="115" cy="70" r="7" fill="#000" />
  <circle cx="85" cy="70" r="3" fill="#39ff14" />
  <circle cx="115" cy="70" r="3" fill="#39ff14" />
  
  <!-- Mouth/Speaker -->
  <rect x="90" y="85" width="20" height="5" rx="2" ry="2" fill="#333" />
  
  <!-- Arms -->
  <rect x="50" y="90" width="20" height="10" rx="3" ry="3" fill="#5a7247" stroke="#2c3e1d" stroke-width="2" />
  <rect x="130" y="90" width="20" height="10" rx="3" ry="3" fill="#5a7247" stroke="#2c3e1d" stroke-width="2" />
  
  <!-- Farming Tool (Hoe) -->
  <line x1="40" y1="90" x2="20" y2="120" stroke="#8b4513" stroke-width="4" />
  <path d="M15 120 L25 120 L20 130 Z" fill="#666" stroke="#333" stroke-width="1" />
  
  <!-- Legs -->
  <rect x="75" y="150" width="15" height="30" rx="3" ry="3" fill="#5a7247" stroke="#2c3e1d" stroke-width="2" />
  <rect x="110" y="150" width="15" height="30" rx="3" ry="3" fill="#5a7247" stroke="#2c3e1d" stroke-width="2" />
  
  <!-- Feet -->
  <rect x="70" y="180" width="25" height="10" rx="3" ry="3" fill="#333" stroke="#222" stroke-width="2" />
  <rect x="105" y="180" width="25" height="10" rx="3" ry="3" fill="#333" stroke="#222" stroke-width="2" />
  
  <!-- Control Panel -->
  <rect x="85" y="100" width="30" height="20" rx="2" ry="2" fill="#333" stroke="#222" stroke-width="1" />
  <circle cx="95" cy="110" r="3" fill="#39ff14" />
  <circle cx="105" cy="110" r="3" fill="#ff3939" />
  
  <!-- Plant/Crop in Hand -->
  <path d="M145 95 C150 85, 155 85, 160 95" stroke="#39ff14" stroke-width="2" fill="none" />
  <path d="M150 95 C155 85, 160 85, 165 95" stroke="#39ff14" stroke-width="2" fill="none" />
  <line x1="155" y1="95" x2="155" y2="105" stroke="#8b4513" stroke-width="2" />
  
  <!-- Weathering and Damage -->
  <path d="M80 60 L85 65 L80 65" fill="#2c3e1d" opacity="0.7" />
  <path d="M120 100 L125 105 L120 105" fill="#2c3e1d" opacity="0.7" />
  <line x1="75" y1="120" x2="85" y2="130" stroke="#2c3e1d" stroke-width="1" opacity="0.7" />
  
  <!-- Fallout-style Radiation Symbol -->
  <g transform="translate(100, 135) scale(0.15)">
    <circle cx="0" cy="0" r="50" fill="#39ff14" opacity="0.7" />
    <circle cx="0" cy="0" r="20" fill="#000" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(0)" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(120)" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(240)" />
  </g>
</svg>
