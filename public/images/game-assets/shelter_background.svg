<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Shelter Background in Fallout Style -->
  
  <!-- Background - Dark Metal Wall -->
  <rect x="0" y="0" width="800" height="600" fill="#1a1a1a" />
  
  <!-- Metal Wall Panels -->
  <g opacity="0.8">
    <!-- Row 1 -->
    <rect x="0" y="0" width="200" height="150" fill="#222222" stroke="#333333" stroke-width="2" />
    <rect x="200" y="0" width="200" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="2" />
    <rect x="400" y="0" width="200" height="150" fill="#222222" stroke="#333333" stroke-width="2" />
    <rect x="600" y="0" width="200" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="2" />
    
    <!-- Row 2 -->
    <rect x="0" y="150" width="200" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="2" />
    <rect x="200" y="150" width="200" height="150" fill="#222222" stroke="#333333" stroke-width="2" />
    <rect x="400" y="150" width="200" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="2" />
    <rect x="600" y="150" width="200" height="150" fill="#222222" stroke="#333333" stroke-width="2" />
    
    <!-- Row 3 -->
    <rect x="0" y="300" width="200" height="150" fill="#222222" stroke="#333333" stroke-width="2" />
    <rect x="200" y="300" width="200" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="2" />
    <rect x="400" y="300" width="200" height="150" fill="#222222" stroke="#333333" stroke-width="2" />
    <rect x="600" y="300" width="200" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="2" />
    
    <!-- Row 4 -->
    <rect x="0" y="450" width="200" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="2" />
    <rect x="200" y="450" width="200" height="150" fill="#222222" stroke="#333333" stroke-width="2" />
    <rect x="400" y="450" width="200" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="2" />
    <rect x="600" y="450" width="200" height="150" fill="#222222" stroke="#333333" stroke-width="2" />
  </g>
  
  <!-- Rivets on Panels -->
  <g fill="#444444">
    <!-- Panel 1 Rivets -->
    <circle cx="20" cy="20" r="5" />
    <circle cx="180" cy="20" r="5" />
    <circle cx="20" cy="130" r="5" />
    <circle cx="180" cy="130" r="5" />
    
    <!-- Panel 2 Rivets -->
    <circle cx="220" cy="20" r="5" />
    <circle cx="380" cy="20" r="5" />
    <circle cx="220" cy="130" r="5" />
    <circle cx="380" cy="130" r="5" />
    
    <!-- Panel 3 Rivets -->
    <circle cx="420" cy="20" r="5" />
    <circle cx="580" cy="20" r="5" />
    <circle cx="420" cy="130" r="5" />
    <circle cx="580" cy="130" r="5" />
    
    <!-- Panel 4 Rivets -->
    <circle cx="620" cy="20" r="5" />
    <circle cx="780" cy="20" r="5" />
    <circle cx="620" cy="130" r="5" />
    <circle cx="780" cy="130" r="5" />
    
    <!-- Repeat for other rows -->
    <!-- Row 2 -->
    <circle cx="20" cy="170" r="5" />
    <circle cx="180" cy="170" r="5" />
    <circle cx="20" cy="280" r="5" />
    <circle cx="180" cy="280" r="5" />
    
    <circle cx="220" cy="170" r="5" />
    <circle cx="380" cy="170" r="5" />
    <circle cx="220" cy="280" r="5" />
    <circle cx="380" cy="280" r="5" />
    
    <circle cx="420" cy="170" r="5" />
    <circle cx="580" cy="170" r="5" />
    <circle cx="420" cy="280" r="5" />
    <circle cx="580" cy="280" r="5" />
    
    <circle cx="620" cy="170" r="5" />
    <circle cx="780" cy="170" r="5" />
    <circle cx="620" cy="280" r="5" />
    <circle cx="780" cy="280" r="5" />
    
    <!-- Row 3 -->
    <circle cx="20" cy="320" r="5" />
    <circle cx="180" cy="320" r="5" />
    <circle cx="20" cy="430" r="5" />
    <circle cx="180" cy="430" r="5" />
    
    <circle cx="220" cy="320" r="5" />
    <circle cx="380" cy="320" r="5" />
    <circle cx="220" cy="430" r="5" />
    <circle cx="380" cy="430" r="5" />
    
    <circle cx="420" cy="320" r="5" />
    <circle cx="580" cy="320" r="5" />
    <circle cx="420" cy="430" r="5" />
    <circle cx="580" cy="430" r="5" />
    
    <circle cx="620" cy="320" r="5" />
    <circle cx="780" cy="320" r="5" />
    <circle cx="620" cy="430" r="5" />
    <circle cx="780" cy="430" r="5" />
    
    <!-- Row 4 -->
    <circle cx="20" cy="470" r="5" />
    <circle cx="180" cy="470" r="5" />
    <circle cx="20" cy="580" r="5" />
    <circle cx="180" cy="580" r="5" />
    
    <circle cx="220" cy="470" r="5" />
    <circle cx="380" cy="470" r="5" />
    <circle cx="220" cy="580" r="5" />
    <circle cx="380" cy="580" r="5" />
    
    <circle cx="420" cy="470" r="5" />
    <circle cx="580" cy="470" r="5" />
    <circle cx="420" cy="580" r="5" />
    <circle cx="580" cy="580" r="5" />
    
    <circle cx="620" cy="470" r="5" />
    <circle cx="780" cy="470" r="5" />
    <circle cx="620" cy="580" r="5" />
    <circle cx="780" cy="580" r="5" />
  </g>
  
  <!-- Vault Door (Circular) -->
  <g transform="translate(400, 300)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="120" fill="#333333" stroke="#444444" stroke-width="5" />
    
    <!-- Middle Ring -->
    <circle cx="0" cy="0" r="100" fill="#222222" stroke="#444444" stroke-width="3" />
    
    <!-- Inner Circle -->
    <circle cx="0" cy="0" r="80" fill="#ffcc00" stroke="#cc9900" stroke-width="3" opacity="0.7" />
    
    <!-- Vault Number -->
    <text x="0" y="15" font-family="Impact, sans-serif" font-size="50" font-weight="bold" 
          text-anchor="middle" fill="#000000">42</text>
    
    <!-- Gear Teeth around Outer Ring -->
    <g fill="#444444">
      <rect x="-10" y="-130" width="20" height="20" />
      <rect x="-10" y="110" width="20" height="20" />
      <rect x="110" y="-10" width="20" height="20" />
      <rect x="-130" y="-10" width="20" height="20" />
      
      <rect x="-10" y="-130" width="20" height="20" transform="rotate(30)" />
      <rect x="-10" y="110" width="20" height="20" transform="rotate(30)" />
      <rect x="110" y="-10" width="20" height="20" transform="rotate(30)" />
      <rect x="-130" y="-10" width="20" height="20" transform="rotate(30)" />
      
      <rect x="-10" y="-130" width="20" height="20" transform="rotate(60)" />
      <rect x="-10" y="110" width="20" height="20" transform="rotate(60)" />
      <rect x="110" y="-10" width="20" height="20" transform="rotate(60)" />
      <rect x="-130" y="-10" width="20" height="20" transform="rotate(60)" />
    </g>
  </g>
  
  <!-- Warning Stripes -->
  <g>
    <rect x="0" y="0" width="800" height="20" fill="#ffcc00" opacity="0.7" />
    <rect x="0" y="580" width="800" height="20" fill="#ffcc00" opacity="0.7" />
    
    <!-- Stripe Pattern -->
    <g fill="#000000" opacity="0.8">
      <rect x="0" y="0" width="40" height="20" />
      <rect x="80" y="0" width="40" height="20" />
      <rect x="160" y="0" width="40" height="20" />
      <rect x="240" y="0" width="40" height="20" />
      <rect x="320" y="0" width="40" height="20" />
      <rect x="400" y="0" width="40" height="20" />
      <rect x="480" y="0" width="40" height="20" />
      <rect x="560" y="0" width="40" height="20" />
      <rect x="640" y="0" width="40" height="20" />
      <rect x="720" y="0" width="40" height="20" />
      
      <rect x="0" y="580" width="40" height="20" />
      <rect x="80" y="580" width="40" height="20" />
      <rect x="160" y="580" width="40" height="20" />
      <rect x="240" y="580" width="40" height="20" />
      <rect x="320" y="580" width="40" height="20" />
      <rect x="400" y="580" width="40" height="20" />
      <rect x="480" y="580" width="40" height="20" />
      <rect x="560" y="580" width="40" height="20" />
      <rect x="640" y="580" width="40" height="20" />
      <rect x="720" y="580" width="40" height="20" />
    </g>
  </g>
  
  <!-- Fallout-style Radiation Symbol -->
  <g transform="translate(150, 150) scale(0.5)">
    <circle cx="0" cy="0" r="50" fill="#ffcc00" opacity="0.7" />
    <circle cx="0" cy="0" r="20" fill="#000" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(0)" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(120)" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(240)" />
  </g>
  
  <!-- Fallout-style Radiation Symbol (opposite side) -->
  <g transform="translate(650, 450) scale(0.5)">
    <circle cx="0" cy="0" r="50" fill="#ffcc00" opacity="0.7" />
    <circle cx="0" cy="0" r="20" fill="#000" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(0)" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(120)" />
    <path d="M0,0 L40,0 A40,40 0 0,0 20,-34.64 z" fill="#000" transform="rotate(240)" />
  </g>
  
  <!-- Weathering and Damage -->
  <g opacity="0.3">
    <path d="M100 50 L150 80 L120 100" fill="#555555" />
    <path d="M500 200 L550 230 L520 250" fill="#555555" />
    <path d="M300 400 L350 430 L320 450" fill="#555555" />
    <path d="M700 350 L750 380 L720 400" fill="#555555" />
    
    <!-- Rust Spots -->
    <circle cx="200" cy="100" r="20" fill="#993300" opacity="0.5" />
    <circle cx="600" cy="200" r="15" fill="#993300" opacity="0.5" />
    <circle cx="300" cy="500" r="25" fill="#993300" opacity="0.5" />
    <circle cx="700" cy="100" r="10" fill="#993300" opacity="0.5" />
  </g>
  
  <!-- Lighting Effect - Top Light -->
  <radialGradient id="topLight" cx="400" cy="0" r="400" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.2" />
    <stop offset="100%" stop-color="#000000" stop-opacity="0" />
  </radialGradient>
  <rect x="0" y="0" width="800" height="600" fill="url(#topLight)" />
  
  <!-- Scanlines Effect -->
  <g opacity="0.05">
    <rect x="0" y="0" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="2" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="4" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="6" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="8" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="10" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="12" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="14" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="16" width="800" height="1" fill="#ffffff" />
    <rect x="0" y="18" width="800" height="1" fill="#ffffff" />
    <!-- Repeat for entire height -->
    <!-- This is a simplified representation - in reality, would need many more lines -->
  </g>
</svg>
