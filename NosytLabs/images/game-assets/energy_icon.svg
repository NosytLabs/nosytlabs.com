<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Energy Icon in Fallout Style -->
  
  <!-- Background -->
  <circle cx="100" cy="100" r="80" fill="#1a1a1a" />
  <circle cx="100" cy="100" r="75" fill="#2a2a2a" />
  
  <!-- Energy Symbol - Lightning Bolt -->
  <path d="M100 30 L80 100 L110 100 L90 170 L120 90 L90 90 L110 30 Z" 
        fill="#ffcc00" stroke="#ff9900" stroke-width="3" />
  
  <!-- Radiation Glow Effect -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.3" />
  <circle cx="100" cy="100" r="60" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.2" />
  
  <!-- Weathered Edge Effect -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#111" stroke-width="3" stroke-dasharray="5,5" opacity="0.5" />
  
  <!-- Fallout-style Text -->
  <text x="100" y="190" font-family="monospace" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="#ffcc00">ENERGY</text>
</svg>
