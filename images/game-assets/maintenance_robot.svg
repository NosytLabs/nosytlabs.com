<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Maintenance Robot in Fallout Style -->
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="#14273d" opacity="0.2" />
  
  <!-- Robot Body -->
  <rect x="70" y="80" width="60" height="70" rx="5" ry="5" fill="#475a72" stroke="#1d2c3e" stroke-width="3" />
  
  <!-- Robot Head -->
  <rect x="75" y="50" width="50" height="40" rx="5" ry="5" fill="#475a72" stroke="#1d2c3e" stroke-width="3" />
  
  <!-- Maintenance Visor -->
  <rect x="75" y="60" width="50" height="15" rx="2" ry="2" fill="#333" stroke="#1d2c3e" stroke-width="1" />
  <rect x="80" y="65" width="40" height="5" fill="#39c4ff" stroke="#1d2c3e" stroke-width="1" opacity="0.7" />
  
  <!-- Antenna -->
  <line x1="100" y1="50" x2="100" y2="35" stroke="#333" stroke-width="2" />
  <circle cx="100" cy="32" r="3" fill="#ff3939" />
  
  <!-- Mouth/Speaker -->
  <rect x="90" y="85" width="20" height="5" rx="2" ry="2" fill="#333" />
  
  <!-- Arms -->
  <rect x="50" y="90" width="20" height="10" rx="3" ry="3" fill="#475a72" stroke="#1d2c3e" stroke-width="2" />
  <rect x="130" y="90" width="20" height="10" rx="3" ry="3" fill="#475a72" stroke="#1d2c3e" stroke-width="2" />
  
  <!-- Maintenance Tool (Multi-tool) -->
  <rect x="30" y="85" width="20" height="15" rx="2" ry="2" fill="#888" stroke="#555" stroke-width="1" />
  <line x1="35" y1="85" x2="35" y2="100" stroke="#555" stroke-width="1" />
  <line x1="40" y1="85" x2="40" y2="100" stroke="#555" stroke-width="1" />
  <line x1="45" y1="85" x2="45" y2="100" stroke="#555" stroke-width="1" />
  
  <!-- Legs -->
  <rect x="75" y="150" width="15" height="30" rx="3" ry="3" fill="#475a72" stroke="#1d2c3e" stroke-width="2" />
  <rect x="110" y="150" width="15" height="30" rx="3" ry="3" fill="#475a72" stroke="#1d2c3e" stroke-width="2" />
  
  <!-- Feet -->
  <rect x="70" y="180" width="25" height="10" rx="3" ry="3" fill="#333" stroke="#222" stroke-width="2" />
  <rect x="105" y="180" width="25" height="10" rx="3" ry="3" fill="#333" stroke="#222" stroke-width="2" />
  
  <!-- Control Panel -->
  <rect x="85" y="100" width="30" height="20" rx="2" ry="2" fill="#333" stroke="#222" stroke-width="1" />
  <circle cx="95" cy="110" r="3" fill="#39c4ff" />
  <circle cx="105" cy="110" r="3" fill="#ff3939" />
  
  <!-- Maintenance Kit -->
  <rect x="140" y="85" width="20" height="15" rx="2" ry="2" fill="#333" stroke="#222" stroke-width="1" />
  <line x1="145" y1="85" x2="145" y2="100" stroke="#555" stroke-width="1" />
  <line x1="150" y1="85" x2="150" y2="100" stroke="#555" stroke-width="1" />
  <line x1="155" y1="85" x2="155" y2="100" stroke="#555" stroke-width="1" />
  
  <!-- Utility Belt -->
  <rect x="70" y="140" width="60" height="10" rx="2" ry="2" fill="#333" stroke="#1d2c3e" stroke-width="2" />
  <rect x="75" y="142" width="5" height="6" rx="1" ry="1" fill="#888" />
  <rect x="85" y="142" width="5" height="6" rx="1" ry="1" fill="#888" />
  <rect x="95" y="142" width="5" height="6" rx="1" ry="1" fill="#888" />
  <rect x="105" y="142" width="5" height="6" rx="1" ry="1" fill="#888" />
  <rect x="115" y="142" width="5" height="6" rx="1" ry="1" fill="#888" />
  
  <!-- Weathering and Damage -->
  <path d="M80 60 L85 65 L80 65" fill="#1d2c3e" opacity="0.7" />
  <path d="M120 100 L125 105 L120 105" fill="#1d2c3e" opacity="0.7" />
  <line x1="75" y1="120" x2="85" y2="130" stroke="#1d2c3e" stroke-width="1" opacity="0.7" />
  
  <!-- Fallout-style Maintenance Symbol -->
  <g transform="translate(100, 135) scale(0.15)">
    <circle cx="0" cy="0" r="50" fill="#39c4ff" opacity="0.7" />
    <circle cx="0" cy="0" r="20" fill="#000" />
    <path d="M-40,-40 L40,40 M-40,40 L40,-40" stroke="#000" stroke-width="15" />
    <circle cx="0" cy="0" r="35" fill="none" stroke="#000" stroke-width="10" />
  </g>
</svg>
