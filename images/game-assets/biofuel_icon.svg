<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Biofuel Icon in Fallout Style -->
  
  <!-- Background -->
  <circle cx="100" cy="100" r="80" fill="#1a1a1a" />
  <circle cx="100" cy="100" r="75" fill="#2a2a2a" />
  
  <!-- Biofuel Symbol - Plant/Leaf with Droplet -->
  <path d="M100 40 C60 40, 60 100, 100 130 C140 100, 140 40, 100 40 Z" 
        fill="#33cc33" stroke="#228822" stroke-width="3" />
  <path d="M100 70 C80 70, 80 100, 100 115 C120 100, 120 70, 100 70 Z" 
        fill="#2a2a2a" stroke="#228822" stroke-width="1" />
  
  <!-- Droplet -->
  <path d="M100 90 C90 90, 85 110, 100 125 C115 110, 110 90, 100 90 Z"
        fill="#3399ff" stroke="#0066cc" stroke-width="2" />
  
  <!-- Radiation Glow Effect -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#33cc33" stroke-width="2" opacity="0.3" />
  <circle cx="100" cy="100" r="60" fill="none" stroke="#33cc33" stroke-width="2" opacity="0.2" />
  
  <!-- Weathered Edge Effect -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#111" stroke-width="3" stroke-dasharray="5,5" opacity="0.5" />
  
  <!-- Fallout-style Text -->
  <text x="100" y="190" font-family="monospace" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="#33cc33">BIOFUEL</text>
</svg>
