<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Research Icon in Fallout Style -->
  
  <!-- Background -->
  <circle cx="100" cy="100" r="80" fill="#1a1a1a" />
  <circle cx="100" cy="100" r="75" fill="#2a2a2a" />
  
  <!-- Research Symbol - Beaker and Atom -->
  <!-- Beaker -->
  <path d="M70 60 L70 130 C70 145, 130 145, 130 130 L130 60 Z" 
        fill="#9966cc" stroke="#7744aa" stroke-width="3" opacity="0.8" />
  <path d="M70 60 L130 60" stroke="#7744aa" stroke-width="3" />
  
  <!-- Liquid in Beaker -->
  <path d="M70 100 L70 130 C70 145, 130 145, 130 130 L130 100 Z" 
        fill="#cc66ff" stroke="none" />
  
  <!-- Bubbles in Beaker -->
  <circle cx="85" cy="115" r="5" fill="#ffffff" opacity="0.6" />
  <circle cx="100" cy="125" r="7" fill="#ffffff" opacity="0.4" />
  <circle cx="115" cy="110" r="4" fill="#ffffff" opacity="0.5" />
  
  <!-- Atom Orbits -->
  <ellipse cx="100" cy="80" rx="30" ry="10" fill="none" stroke="#cc66ff" stroke-width="2" transform="rotate(0, 100, 80)" />
  <ellipse cx="100" cy="80" rx="30" ry="10" fill="none" stroke="#cc66ff" stroke-width="2" transform="rotate(60, 100, 80)" />
  <ellipse cx="100" cy="80" rx="30" ry="10" fill="none" stroke="#cc66ff" stroke-width="2" transform="rotate(120, 100, 80)" />
  
  <!-- Atom Nucleus -->
  <circle cx="100" cy="80" r="8" fill="#cc66ff" stroke="#7744aa" stroke-width="1" />
  
  <!-- Radiation Glow Effect -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#cc66ff" stroke-width="2" opacity="0.3" />
  <circle cx="100" cy="100" r="60" fill="none" stroke="#cc66ff" stroke-width="2" opacity="0.2" />
  
  <!-- Weathered Edge Effect -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#111" stroke-width="3" stroke-dasharray="5,5" opacity="0.5" />
  
  <!-- Fallout-style Text -->
  <text x="100" y="190" font-family="monospace" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="#cc66ff">RESEARCH</text>
</svg>
